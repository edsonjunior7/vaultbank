server:
  port: 8083

spring:
  application:
    name: transaction-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vaultbank_transactions}
    username: ${SPRING_DATASOURCE_USERNAME:vaultbank}
    password: ${SPRING_DATASOURCE_PASSWORD:vaultbank123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:vaultbank-super-secret-key-256bits-change-in-production}

# URL do account-service para comunicacao interna
services:
  account-service-url: ${ACCOUNT_SERVICE_URL:http://account-service:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.vaultbank: DEBUG

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
