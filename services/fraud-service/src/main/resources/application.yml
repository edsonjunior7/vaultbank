server:
  port: 8085

spring:
  application:
    name: fraud-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vaultbank_fraud}
    username: ${SPRING_DATASOURCE_USERNAME:vaultbank}
    password: ${SPRING_DATASOURCE_PASSWORD:vaultbank123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis123}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: fraud-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Regras de fraude configuráveis
fraud:
  rules:
    max-transactions-per-minute: 5
    max-amount-per-transaction: 10000.00
    max-amount-per-hour: 20000.00
    suspicious-amount-threshold: 5000.00

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.vaultbank: DEBUG
