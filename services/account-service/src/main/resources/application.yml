server:
  port: 8082

spring:
  application:
    name: account-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vaultbank_accounts}
    username: ${SPRING_DATASOURCE_USERNAME:vaultbank}
    password: ${SPRING_DATASOURCE_PASSWORD:vaultbank123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis123}

jwt:
  secret: ${JWT_SECRET:vaultbank-super-secret-key-256bits-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.vaultbank: DEBUG
