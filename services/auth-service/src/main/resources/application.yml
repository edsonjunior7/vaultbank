server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vaultbank_auth}
    username: ${SPRING_DATASOURCE_USERNAME:vaultbank}
    password: ${SPRING_DATASOURCE_PASSWORD:vaultbank123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis123}
      timeout: 2000ms

jwt:
  secret: ${JWT_SECRET:vaultbank-super-secret-key-256bits-change-in-production}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Chave AES-256 para criptografia de dados sensiveis (Base64, 32 bytes)
crypto:
  secret-key: ${CRYPTO_SECRET_KEY:0v1xL5POSlkFGaDfMiSNPxA5qdx4c+bfDr/ZVzpyMkg=}

security:
  max-login-attempts: 5
  lock-duration-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.vaultbank: DEBUG
    org.springframework.security: INFO
