services:

  postgres:
    image: postgres:16-alpine
    container_name: vaultbank-postgres
    environment:
      POSTGRES_USER: vaultbank
      POSTGRES_PASSWORD: vaultbank123
      POSTGRES_DB: vaultbank_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/create-databases.sql:/docker-entrypoint-initdb.d/00-create-dbs.sql
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-auth.sql
      - ./docker/init-account-db.sql:/docker-entrypoint-initdb.d/02-accounts.sql
      - ./docker/init-transaction-db.sql:/docker-entrypoint-initdb.d/03-transactions.sql
      - ./docker/init-notification-db.sql:/docker-entrypoint-initdb.d/04-notifications.sql
      - ./docker/init-fraud-db.sql:/docker-entrypoint-initdb.d/05-fraud.sql
      - ./docker/init-audit-db.sql:/docker-entrypoint-initdb.d/06-audit.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultbank"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaultbank-net

  redis:
    image: redis:7-alpine
    container_name: vaultbank-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaultbank-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: vaultbank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaultbank-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: vaultbank-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - vaultbank-net

  # ─── Observabilidade ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: vaultbank-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - vaultbank-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: vaultbank-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: vaultbank123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - vaultbank-net

  zipkin:
    image: openzipkin/zipkin:3
    container_name: vaultbank-zipkin
    ports:
      - "9411:9411"
    networks:
      - vaultbank-net

  # ─── Application Services ─────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: vaultbank-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vaultbank_auth
      SPRING_DATASOURCE_USERNAME: vaultbank
      SPRING_DATASOURCE_PASSWORD: vaultbank123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis123
      JWT_SECRET: vaultbank-super-secret-key-256bits-production-ready
      JWT_ACCESS_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
      CRYPTO_SECRET_KEY: 0v1xL5POSlkFGaDfMiSNPxA5qdx4c+bfDr/ZVzpyMkg=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vaultbank-net

  account-service:
    build:
      context: ./services/account-service
      dockerfile: Dockerfile
    container_name: vaultbank-account
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vaultbank_accounts
      SPRING_DATASOURCE_USERNAME: vaultbank
      SPRING_DATASOURCE_PASSWORD: vaultbank123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis123
      JWT_SECRET: vaultbank-super-secret-key-256bits-production-ready
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vaultbank-net

  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: vaultbank-transaction
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vaultbank_transactions
      SPRING_DATASOURCE_USERNAME: vaultbank
      SPRING_DATASOURCE_PASSWORD: vaultbank123
      JWT_SECRET: vaultbank-super-secret-key-256bits-production-ready
      ACCOUNT_SERVICE_URL: http://account-service:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      account-service:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - vaultbank-net

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: vaultbank-notification
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vaultbank_notifications
      SPRING_DATASOURCE_USERNAME: vaultbank
      SPRING_DATASOURCE_PASSWORD: vaultbank123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vaultbank-net

  fraud-service:
    build:
      context: ./services/fraud-service
      dockerfile: Dockerfile
    container_name: vaultbank-fraud
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vaultbank_fraud
      SPRING_DATASOURCE_USERNAME: vaultbank
      SPRING_DATASOURCE_PASSWORD: vaultbank123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vaultbank-net

  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    container_name: vaultbank-audit
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vaultbank_audit
      SPRING_DATASOURCE_USERNAME: vaultbank
      SPRING_DATASOURCE_PASSWORD: vaultbank123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vaultbank-net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  vaultbank-net:
    driver: bridge
